name: IPL Pulse Daily Generator

on:
  schedule:
    - cron: '30 20 * * *' # 2:00 AM IST
  workflow_dispatch: # Allows manual trigger from Next.js dashboard

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Generate Podcast
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/generate_podcast.py

      - name: Commit and Push New Episode
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/episodes/ public/status.json
          git commit -m "feat: New IPL Pulse episode [skip ci]" || echo "No changes to commit"
          git push
